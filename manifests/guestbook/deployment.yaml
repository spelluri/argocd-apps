apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
        version: "v2"
    spec:
      containers:
      - name: guestbook-ui
        image: nginx:alpine        
        ports:
        - containerPort: 80
